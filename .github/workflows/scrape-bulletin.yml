name: Daily Bulletin Scrape

on:
  schedule:
    - cron: '0 20 * * *'  # 每日台灣時間 04:00（UTC 20:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scrape bulletin
        run: npm run scrape:bulletin

      - name: Commit updated bulletin.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f public/bulletin.json
          git diff --cached --quiet || git commit -m "chore: update bulletin data"
          git push
